    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      transition: background-color 0.5s ease, color 0.5s ease;
      min-height: 100vh;
      margin: 0;
    }
    
    /* Light Mode: Professional Soft Grey-Blue */
    body {
      background-color: #f1f5f9; /* slate-100 */
      color: #0f172a; /* slate-900 */
    }
    .bg-mesh {
      background-image: 
        radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.08) 0, transparent 50%), 
        radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.08) 0, transparent 50%);
    }

    /* Dark Mode: Deep Slate */
    .dark body {
      background-color: #020617; /* slate-950 */
      color: #f1f5f9; /* slate-100 */
    }
    .dark .bg-mesh {
      background-image: 
        radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.12) 0, transparent 50%), 
        radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.08) 0, transparent 50%);
    }

    .glass {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 0, 0, 0.1);
    }
    .dark .glass {
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .text-gradient {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #db2777 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .dark .text-gradient {
      background: linear-gradient(135deg, #818cf8 0%, #a78bfa 50%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Improved card visibility for light mode */
    .card-elevated {
      background-color: #ffffff;
      border: 1px solid #e2e8f0; /* slate-200 */
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
    }
    .dark .card-elevated {
      background-color: #0f172a; /* slate-900 */
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: none;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2);
    }

    * {
      transition: background-color 300ms ease, border-color 300ms ease, color 300ms ease, box-shadow 300ms ease;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
    .animate-shake {
      animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
    }
  </style>
